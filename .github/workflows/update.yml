name: update-deps

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions: {}

concurrency:
  group: update-deps
  cancel-in-progress: true

jobs:
  update:
    name: Update Deno dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create branch and push
      pull-requests: write # to create PR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
      - name: Update dependencies
        run: deno outdated --update
      - name: Run CI checks
        run: deno task ci
      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No dependency updates found"
            exit 0
          fi
          branch="chore/update-deps-$(date +%Y%m%d)"
          git checkout -b "$branch"
          git commit -m "chore(deps): update deno dependencies"
          git push -u origin "$branch"
          gh pr create --title "chore(deps): update deno dependencies" --body "Automated dependency update by GitHub Actions."
